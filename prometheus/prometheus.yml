global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          environment: 'local'

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          environment: 'local'

  - job_name: 'openclaw'
    scrape_interval: 30s
    scrape_timeout: 15s
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          environment: 'local'
